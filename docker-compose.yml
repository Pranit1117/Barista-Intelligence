version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DEMO_MODE=true
      - RL_LIVE_TRAINING=true
    volumes:
      - ./data:/app/data
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=true
    volumes:
      - ./data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - app
