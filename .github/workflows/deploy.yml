name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Streamlit Cloud deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify app entrypoint exists
        run: |
          test -f app/main.py && echo "✓ app/main.py found"
          test -f requirements.txt && echo "✓ requirements.txt found"

      - name: Notify deployment
        run: |
          echo "Streamlit Cloud picks up pushes to main automatically."
          echo "App: https://share.streamlit.io/YOUR_USERNAME/barista-iq/app/main.py"
          echo "Docs: https://docs.streamlit.io/deploy/streamlit-community-cloud"
